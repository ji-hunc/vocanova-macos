name: VocaNovaApp
options:
  bundleIdPrefix: app.vocanova
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""             # ← Xcode에서 본인 팀으로 변경
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Xcode 15+의 Debug dylib 분리는 .app을 다른 경로로 복사하면 dylib/리소스 경로가
    # 깨져서 SPM `Bundle.module`이 실패한다. 로컬 설치(/Applications) 시나리오를
    # 지원해야 하므로 Debug에서도 단일 바이너리로 빌드.
    ENABLE_DEBUG_DYLIB_SUPPORT: NO

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  VocaNovaApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VocaNovaApp
        excludes:
          - Resources/Info.plist
          - Resources/VocaNovaApp.entitlements
    resources:
      - VocaNovaApp/Resources/Assets.xcassets
    info:
      path: VocaNovaApp/Resources/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.education
        ITSAppUsesNonExemptEncryption: false
        NSHumanReadableCopyright: "© 2026 VocaNova"
        CFBundleDisplayName: VocaNova
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: app.vocanova.callback
            CFBundleTypeRole: Viewer
            CFBundleURLSchemes:
              - vocanova
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vocanova.macos
        CODE_SIGN_ENTITLEMENTS: VocaNovaApp/Resources/VocaNovaApp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # 사용자에게 보이는 이름은 "VocaNova" — 빌드 산출물도 VocaNova.app이 된다.
        # 디렉터리/Xcode 프로젝트 이름(VocaNovaApp)과는 별개.
        PRODUCT_NAME: VocaNova
    dependencies:
      - package: KeyboardShortcuts

  VocaNovaAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - VocaNovaAppTests
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VocaNova.app/Contents/MacOS/VocaNova
    dependencies:
      - target: VocaNovaApp

schemes:
  VocaNovaApp:
    build:
      targets:
        VocaNovaApp: all
        VocaNovaAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VocaNovaAppTests

name: VocaNovaApp
options:
  bundleIdPrefix: app.vocanova
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "QKMR36DFCB" # ← Xcode에서 본인 팀으로 변경
    ENABLE_HARDENED_RUNTIME: YES
    # 외부 배포 (Developer ID + notarization). MAS 출시 포기 후 전환.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Xcode 15+의 Debug dylib 분리는 .app을 다른 경로로 복사하면 dylib/리소스 경로가
    # 깨져서 SPM `Bundle.module`이 실패한다. 또한 stub+dylib 구조는 TCC가 코드
    # identity를 안정적으로 해석하지 못하게 만들어 손쉬운 사용 자동 등록(prompt path)을
    # 거부시키는 부작용이 있다. 두 문제 모두를 막기 위해 Debug에서도 단일 바이너리로 빌드.
    # 정확한 키는 `ENABLE_DEBUG_DYLIB` (다른 비슷한 이름 `ENABLE_DEBUG_DYLIB_SUPPORT`는
    # 효과 없는 misnomer — `xcodebuild -showBuildSettings`로 확인됨).
    ENABLE_DEBUG_DYLIB: NO

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  VocaNovaApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VocaNovaApp
        excludes:
          - Resources/Info.plist
          - Resources/VocaNovaApp.entitlements
    resources:
      - VocaNovaApp/Resources/Assets.xcassets
    info:
      path: VocaNovaApp/Resources/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.education
        ITSAppUsesNonExemptEncryption: false
        NSHumanReadableCopyright: "© 2026 VocaNova"
        CFBundleDisplayName: VocaNova
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: app.vocanova.callback
            CFBundleTypeRole: Viewer
            CFBundleURLSchemes:
              - vocanova
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.vocanova.macos
        CODE_SIGN_ENTITLEMENTS: VocaNovaApp/Resources/VocaNovaApp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        # App Sandbox는 AX API와 호환되지 않아 외부 배포 전환 시 끔. Hardened Runtime은 유지.
        ENABLE_APP_SANDBOX: NO
        # Developer ID Provisioning Profile. Sign in with Apple entitlement이
        # PP를 요구하므로 외부 배포에서도 필수. developer.apple.com에서 발급.
        PROVISIONING_PROFILE_SPECIFIER: "VocaNova Developer ID"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # 사용자에게 보이는 이름은 "VocaNova" — 빌드 산출물도 VocaNova.app이 된다.
        # 디렉터리/Xcode 프로젝트 이름(VocaNovaApp)과는 별개.
        PRODUCT_NAME: VocaNova
    dependencies:
      - package: KeyboardShortcuts

  VocaNovaAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - VocaNovaAppTests
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VocaNova.app/Contents/MacOS/VocaNova
    dependencies:
      - target: VocaNovaApp

schemes:
  VocaNovaApp:
    build:
      targets:
        VocaNovaApp: all
        VocaNovaAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VocaNovaAppTests
